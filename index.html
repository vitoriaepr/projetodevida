<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Objetivos</title>

  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="conteudo-principal">

    <h2 class="titulo-principal">
      Meus Objetivos <span>_</span>
    </h2>

    <div class="botoes">
      <button class="botao ativo">Mudar de casa</button>
      <button class="botao">Vestibular</button>
      <button class="botao">Ensino Médio</button>
      <button class="botao">Financeiro</button>
    </div>

    <div class="abas-textos">

      <!-- ABA 0 -->
      <div class="aba-conteudo ativo">
        <h3>Mudar de casa</h3>
        <div class="contador">
          <div class="contador-digito"><p id="dias0">00</p><span>dias</span></div>
          <div class="contador-digito"><p id="horas0">00</p><span>horas</span></div>
          <div class="contador-digito"><p id="min0">00</p><span>min</span></div>
          <div class="contador-digito"><p id="seg0">00</p><span>seg</span></div>
        </div>
      </div>

      <!-- ABA 1 -->
      <div class="aba-conteudo">
        <h3>Passar no vestibular</h3>
        <div class="contador">
          <div class="contador-digito"><p id="dias1">00</p><span>dias</span></div>
          <div class="contador-digito"><p id="horas1">00</p><span>horas</span></div>
          <div class="contador-digito"><p id="min1">00</p><span>min</span></div>
          <div class="contador-digito"><p id="seg1">00</p><span>seg</span></div>
        </div>
      </div>

      <!-- ABA 2 -->
      <div class="aba-conteudo">
        <h3>Terminar o ensino médio</h3>
        <div class="contador">
          <div class="contador-digito"><p id="dias2">00</p><span>dias</span></div>
          <div class="contador-digito"><p id="horas2">00</p><span>horas</span></div>
          <div class="contador-digito"><p id="min2">00</p><span>min</span></div>
          <div class="contador-digito"><p id="seg2">00</p><span>seg</span></div>
        </div>
      </div>

      <!-- ABA 3 -->
      <div class="aba-conteudo">
        <h3>Me organizar financeiramente</h3>
        <div class="contador">
          <div class="contador-digito"><p id="dias3">00</p><span>dias</span></div>
          <div class="contador-digito"><p id="horas3">00</p><span>horas</span></div>
          <div class="contador-digito"><p id="min3">00</p><span>min</span></div>
          <div class="contador-digito"><p id="seg3">00</p><span>seg</span></div>
        </div>
      </div>

    </div>
  </main>

  <script src="main.js" defer></script>
</body>
</html>
